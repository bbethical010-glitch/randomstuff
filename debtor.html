<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Payment Status — BookPrint Pro</title>
    <meta name="description" content="View your invoice and payment status securely with BookPrint Pro.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════
           ROOT TOKENS
        ═══════════════════════════════════════════════ */
        :root {
            --gold:          #D4AF37;
            --gold-light:    #F0D060;
            --gold-dark:     #A88B20;
            --navy:          #0A192F;
            --navy-mid:      #0F2540;
            --navy-light:    #172A45;
            --success:       #10B981;
            --success-bg:    #ECFDF5;
            --success-light: #D1FAE5;
            --warning:       #F59E0B;
            --warning-bg:    #FFFBEB;
            --warning-light: #FDE68A;
            --danger:        #EF4444;
            --danger-bg:     #FEF2F2;
            --danger-light:  #FECACA;
            --text-dark:     #0F172A;
            --text-mid:      #334155;
            --text-muted:    #64748B;
            --border:        #E2E8F0;
            --white:         #FFFFFF;
            --bg-page:       #F1F5F9;
            --radius-xl:     24px;
            --radius-lg:     16px;
            --radius-md:     12px;
            --radius-sm:     8px;
            --shadow-card:   0 32px 80px rgba(0,0,0,0.45), 0 8px 24px rgba(0,0,0,0.25);
            --shadow-sm:     0 2px 8px rgba(0,0,0,0.08);
            --transition:    all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ═══════════════════════════════════════════════
           RESET & BASE
        ═══════════════════════════════════════════════ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--navy);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 16px 80px;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ═══════════════════════════════════════════════
           ANIMATED BACKGROUND
        ═══════════════════════════════════════════════ */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-canvas::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(212,175,55,0.10) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 90%, rgba(16,185,129,0.06) 0%, transparent 60%),
                linear-gradient(160deg, #0A192F 0%, #0d2340 50%, #0f2c50 100%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            animation: float 18s ease-in-out infinite;
        }
        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #D4AF37, transparent);
            top: -150px; left: -100px;
            animation-duration: 20s;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #10B981, transparent);
            bottom: -100px; right: -80px;
            animation-duration: 24s;
            animation-delay: -8s;
        }
        .orb-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #3B82F6, transparent);
            top: 50%; left: 60%;
            animation-duration: 16s;
            animation-delay: -4s;
            opacity: 0.06;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* ═══════════════════════════════════════════════
           LAYOUT CONTAINER
        ═══════════════════════════════════════════════ */
        .page-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* ═══════════════════════════════════════════════
           TOP BRANDING
        ═══════════════════════════════════════════════ */
        .brand-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 32px;
            animation: slideDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            width: 46px; height: 46px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 900; color: var(--navy);
            letter-spacing: -1px;
            box-shadow: 0 6px 20px rgba(212,175,55,0.40), 0 2px 6px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .brand-name {
            font-size: 20px; font-weight: 800;
            color: var(--white); letter-spacing: -0.4px;
        }

        .brand-name span { color: var(--gold); }

        .brand-tagline {
            font-size: 11px; font-weight: 500;
            color: rgba(255,255,255,0.38);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        /* ═══════════════════════════════════════════════
           MAIN CARD
        ═══════════════════════════════════════════════ */
        .card {
            width: 100%;
            background: var(--white);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--shadow-card);
            animation: riseUp 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
        }

        @keyframes riseUp {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Card Header ── */
        .card-header {
            background: linear-gradient(145deg, var(--navy) 0%, #1a3558 100%);
            padding: 32px 36px 28px;
            position: relative;
            overflow: hidden;
        }

        .card-header::before,
        .card-header::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .card-header::before {
            width: 220px; height: 220px;
            top: -80px; right: -60px;
            background: radial-gradient(circle, rgba(212,175,55,0.12), transparent 70%);
        }

        .card-header::after {
            width: 150px; height: 150px;
            bottom: -60px; left: -40px;
            background: radial-gradient(circle, rgba(255,255,255,0.04), transparent 70%);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .header-label {
            font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.14em;
            color: rgba(255,255,255,0.38);
            margin-bottom: 6px;
        }

        .header-invoice-num {
            font-size: 24px; font-weight: 800;
            color: var(--white); letter-spacing: -0.5px;
            line-height: 1;
        }

        .header-business {
            font-size: 13px; color: rgba(255,255,255,0.55);
            margin-top: 4px;
            font-weight: 500;
        }

        .header-badge-secure {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 11px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 9999px;
            font-size: 10px; font-weight: 600;
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .header-badge-secure .lock-dot {
            width: 6px; height: 6px;
            background: var(--gold);
            border-radius: 50%;
        }

        /* ── Status Banner ── */
        .status-banner {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 24px 36px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .status-banner.paid    { background: linear-gradient(to right, #F0FDF4, #ECFDF5); }
        .status-banner.partial { background: linear-gradient(to right, #FFFBEB, #FEF9E5); }
        .status-banner.unpaid  { background: linear-gradient(to right, #FFF5F5, #FEF2F2); }

        .status-icon-wrap {
            width: 58px; height: 58px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .icon-paid    { background: var(--success-light); }
        .icon-partial { background: var(--warning-light); }
        .icon-unpaid  { background: var(--danger-light); }

        .status-info { flex: 1; min-width: 0; }

        .status-pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.10em;
            margin-bottom: 8px;
        }

        .pill-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
        }

        .pill-paid    { background: #DCFCE7; color: #14532D; }
        .pill-paid .pill-dot    { background: #16A34A; }
        .pill-partial { background: #FEF3C7; color: #78350F; }
        .pill-partial .pill-dot { background: #D97706; }
        .pill-unpaid  { background: #FEE2E2; color: #7F1D1D; }
        .pill-unpaid .pill-dot  { background: #DC2626; }

        .status-amount {
            font-size: 32px; font-weight: 900;
            line-height: 1; letter-spacing: -1px;
        }

        .amount-paid    { color: #059669; }
        .amount-partial { color: #D97706; }
        .amount-unpaid  { color: #DC2626; }

        .status-note {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 500;
        }

        /* ── Overdue Alert ── */
        .overdue-alert {
            margin: 20px 28px 0;
            padding: 14px 18px;
            background: #FFF1F2;
            border: 1.5px solid #FECDD3;
            border-radius: var(--radius-lg);
            display: flex; align-items: flex-start; gap: 12px;
            animation: pulseRed 2.5s ease-in-out infinite;
        }

        @keyframes pulseRed {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.0); }
            50%       { box-shadow: 0 0 0 5px rgba(239,68,68,0.08); }
        }

        .overdue-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }

        .overdue-text {
            font-size: 13px; color: #9F1239;
            line-height: 1.5; font-weight: 500;
        }

        .overdue-text strong { font-weight: 700; display: block; margin-bottom: 2px; }

        /* ── Card Body ── */
        .card-body { padding: 28px 36px 0; }

        .section-label {
            font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.14em;
            color: #94A3B8;
            margin-bottom: 12px;
        }

        /* ── Detail Table ── */
        .detail-table {
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 24px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 18px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
            transition: var(--transition);
        }

        .detail-row:last-child { border-bottom: none; }
        .detail-row:hover { background: #F8FAFC; }

        .detail-label {
            font-size: 13px; color: var(--text-muted);
            font-weight: 500; flex-shrink: 0;
        }

        .detail-value {
            font-size: 13px; font-weight: 600;
            color: var(--text-dark);
            text-align: right;
            word-break: break-word;
            max-width: 62%;
        }

        /* ── Payment Breakdown ── */
        .breakdown-box {
            background: linear-gradient(135deg, #F8FAFC, #F1F5F9);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 24px;
        }

        .breakdown-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 20px;
            font-size: 14px;
            border-bottom: 1px dashed #E2E8F0;
        }

        .breakdown-row:last-child { border-bottom: none; }

        .breakdown-label { color: var(--text-muted); font-weight: 500; }
        .breakdown-value { font-weight: 600; color: var(--text-dark); }

        .breakdown-row.paid-credit .breakdown-value { color: var(--success); }

        .breakdown-row.total-row {
            font-size: 16px; font-weight: 700;
            background: var(--white);
            border-top: 1px solid var(--border);
            border-bottom: none;
            padding: 16px 20px;
        }

        .total-paid    { color: var(--success) !important; }
        .total-partial { color: var(--warning) !important; }
        .total-unpaid  { color: var(--danger) !important; }

        /* ── Success Box ── */
        .success-box {
            background: linear-gradient(135deg, #F0FDF4, #DCFCE7);
            border: 1.5px solid #BBF7D0;
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            text-align: center;
            margin-bottom: 28px;
            animation: popIn 0.5s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes popIn {
            from { transform: scale(0.88); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        .success-emoji { font-size: 44px; margin-bottom: 10px; display: block; }
        .success-title { font-size: 17px; font-weight: 800; color: #065F46; margin-bottom: 5px; }
        .success-sub   { font-size: 13px; color: #059669; line-height: 1.5; }

        /* ── Contact Footer ── */
        .card-footer {
            background: #F8FAFC;
            border-top: 1px solid var(--border);
            padding: 20px 36px;
            text-align: center;
        }

        .card-footer p {
            font-size: 12px; color: var(--text-muted);
            line-height: 1.7;
        }

        .card-footer strong { color: var(--text-mid); }

        .card-footer a {
            color: var(--navy);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            transition: var(--transition);
        }

        .card-footer a:hover { color: var(--gold-dark); border-color: var(--gold-dark); }

        /* ── Page Footer ── */
        .page-footer {
            margin-top: 24px;
            text-align: center;
            animation: slideDown 0.6s 0.4s ease-out both;
        }

        .page-footer p {
            font-size: 11px; color: rgba(255,255,255,0.22);
            letter-spacing: 0.04em;
        }

        /* ═══════════════════════════════════════════════
           LOADING STATE
        ═══════════════════════════════════════════════ */
        .loading-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 60px 20px;
            color: rgba(255,255,255,0.55);
        }

        .spinner-track {
            width: 44px; height: 44px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-size: 14px; font-weight: 500;
            color: rgba(255,255,255,0.5);
        }

        /* ═══════════════════════════════════════════════
           ERROR STATE
        ═══════════════════════════════════════════════ */
        .error-card {
            width: 100%;
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 56px 40px;
            text-align: center;
            box-shadow: var(--shadow-card);
            animation: riseUp 0.5s ease-out both;
        }

        .error-icon-wrap {
            width: 80px; height: 80px;
            background: var(--danger-bg);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 38px;
            margin: 0 auto 20px;
        }

        .error-title {
            font-size: 22px; font-weight: 800;
            color: var(--text-dark); margin-bottom: 10px;
        }

        .error-sub {
            font-size: 14px; color: var(--text-muted);
            line-height: 1.7; max-width: 320px; margin: 0 auto;
        }

        /* ═══════════════════════════════════════════════
           RESPONSIVE
        ═══════════════════════════════════════════════ */
        @media (max-width: 520px) {
            body { padding: 28px 12px 64px; }

            .brand-bar { margin-bottom: 24px; }

            .card-header, .card-body, .card-footer { padding-left: 24px; padding-right: 24px; }

            .status-banner { padding: 20px 24px; gap: 16px; }

            .status-icon-wrap { width: 50px; height: 50px; font-size: 24px; }

            .status-amount { font-size: 28px; }

            .overdue-alert { margin: 16px 16px 0; }

            .detail-row { padding: 12px 16px; }

            .breakdown-row { padding: 12px 16px; }

            .error-card { padding: 40px 24px; }
        }

        @media (max-width: 380px) {
            .header-invoice-num { font-size: 20px; }
            .status-amount { font-size: 24px; }
        }
    </style>
</head>
<body>

    <!-- Animated BG -->
    <div class="bg-canvas" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="page-wrapper">

        <!-- Branding -->
        <div class="brand-bar">
            <div class="brand-logo">B</div>
            <div class="brand-text">
                <div class="brand-name">BookPrint <span>Pro</span></div>
                <div class="brand-tagline">Secure Payment Portal</div>
            </div>
        </div>

        <!-- Dynamic content root -->
        <div id="root">
            <div class="loading-wrap">
                <div class="spinner-track" aria-label="Loading"></div>
                <div class="loading-text">Loading your invoice…</div>
            </div>
        </div>

        <!-- Page footer -->
        <footer class="page-footer">
            <p>Secured &amp; encrypted · BookPrint Pro · &copy; <span id="yr"></span></p>
        </footer>

    </div>

    <script>
        // ── Set year ──────────────────────────────────
        document.getElementById('yr').textContent = new Date().getFullYear();

        // ── Helpers ───────────────────────────────────
        function fmt(v) {
            return new Intl.NumberFormat('en-IN', {
                style: 'currency', currency: 'INR', minimumFractionDigits: 2
            }).format(v || 0);
        }

        function fmtDate(d) {
            if (!d) return 'Upon Receipt';
            // Parse as local date, not UTC
            const parts = d.split('-');
            if (parts.length === 3) {
                const dt = new Date(+parts[0], +parts[1] - 1, +parts[2]);
                return dt.toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' });
            }
            return d;
        }

        function payStatus(totalSell, amtPaid) {
            const bal = (totalSell || 0) - (amtPaid || 0);
            if (bal <= 0.01)         return 'paid';
            if ((amtPaid || 0) > 0)  return 'partial';
            return 'unpaid';
        }

        // ── Error renderer ───────────────────────────
        function renderError(title, msg) {
            document.getElementById('root').innerHTML = `
                <div class="error-card">
                    <div class="error-icon-wrap">🔒</div>
                    <h1 class="error-title">${title}</h1>
                    <p class="error-sub">${msg}</p>
                </div>
            `;
            document.title = 'Invalid Link — BookPrint Pro';
        }

        // ── Main renderer ────────────────────────────
        function render() {
            const hash = window.location.hash || '';

            // Support both  #data=BASE64  and  ?data=BASE64  (in hash portion)
            const match = hash.match(/[#&?]data=([^&]*)/);

            if (!match || !match[1]) {
                renderError(
                    'No Invoice Found',
                    'This link appears incomplete or invalid. Please ask BookPrint Pro to resend your payment link.'
                );
                return;
            }

            let inv;
            try {
                const decoded = decodeURIComponent(match[1]);
                inv = JSON.parse(atob(decoded));
            } catch (e) {
                renderError(
                    'Link Corrupted',
                    'We couldn\'t read your invoice data. The link may have been altered. Please contact BookPrint Pro for a fresh link.'
                );
                return;
            }

            const {
                invoiceNum, customer, title, pages, qty,
                sellPrice, totalSell, amtPaid,
                date, dueDate,
                businessName, businessContact
            } = inv;

            const balance    = (totalSell || 0) - (amtPaid || 0);
            const status     = payStatus(totalSell, amtPaid);
            const today      = new Date().toISOString().split('T')[0];
            const isOverdue  = dueDate && dueDate < today && status !== 'paid';
            const biz        = businessName  || 'BookPrint Pro Services';
            const contact    = businessContact || 'contact@bookprintpro.com';

            // Status config
            const SC = {
                paid: {
                    bannerClass: 'paid',    iconClass: 'icon-paid',
                    pillClass: 'pill-paid', pillLabel: 'Payment Complete',
                    amountClass: 'amount-paid',   totalClass: 'total-paid',
                    icon: '✅', note: 'Nothing outstanding'
                },
                partial: {
                    bannerClass: 'partial',   iconClass: 'icon-partial',
                    pillClass: 'pill-partial', pillLabel: 'Partially Paid',
                    amountClass: 'amount-partial', totalClass: 'total-partial',
                    icon: '⏳', note: 'Remaining balance due'
                },
                unpaid: {
                    bannerClass: 'unpaid',   iconClass: 'icon-unpaid',
                    pillClass: 'pill-unpaid', pillLabel: 'Payment Due',
                    amountClass: 'amount-unpaid', totalClass: 'total-unpaid',
                    icon: '⚠️', note: 'Full amount outstanding'
                }
            }[status];

            const displayAmount = status === 'paid' ? 0 : balance;

            document.title = `Invoice ${invoiceNum} — BookPrint Pro`;

            const overdueHTML = isOverdue ? `
                <div class="overdue-alert" role="alert">
                    <span class="overdue-icon">🚨</span>
                    <div class="overdue-text">
                        <strong>This invoice is overdue</strong>
                        Due date was ${fmtDate(dueDate)}. Please settle this payment immediately to avoid any disruptions.
                    </div>
                </div>
            ` : '';

            const dueStyle  = isOverdue ? 'color:#DC2626; font-weight:700;' : '';
            const dueSuffix = isOverdue ? ' ⚠️' : '';

            const successHTML = status === 'paid' ? `
                <div class="success-box">
                    <span class="success-emoji">🎉</span>
                    <div class="success-title">Your payment is complete. Thank you!</div>
                    <div class="success-sub">We appreciate your prompt settlement. Your account with BookPrint Pro is fully cleared.</div>
                </div>
            ` : '';

            const bodyTopMargin = isOverdue ? '24px' : '0';

            document.getElementById('root').innerHTML = `
                <div class="card" role="main">

                    <!-- ── Header ── -->
                    <div class="card-header">
                        <div class="header-top">
                            <div>
                                <div class="header-label">Invoice Reference</div>
                                <div class="header-invoice-num">${escHtml(invoiceNum)}</div>
                                <div class="header-business">${escHtml(biz)}</div>
                            </div>
                            <div class="header-badge-secure">
                                <span class="lock-dot"></span>
                                Secure
                            </div>
                        </div>
                    </div>

                    <!-- ── Status Banner ── -->
                    <div class="status-banner ${SC.bannerClass}">
                        <div class="status-icon-wrap ${SC.iconClass}" aria-hidden="true">${SC.icon}</div>
                        <div class="status-info">
                            <div class="status-pill ${SC.pillClass}">
                                <span class="pill-dot"></span>
                                ${SC.pillLabel}
                            </div>
                            <div class="status-amount ${SC.amountClass}">${fmt(displayAmount)}</div>
                            <div class="status-note">${SC.note}</div>
                        </div>
                    </div>

                    ${overdueHTML}

                    <!-- ── Body ── -->
                    <div class="card-body">

                        <!-- Order Details -->
                        <div class="section-label" style="margin-top:${bodyTopMargin};">Order Details</div>
                        <div class="detail-table" role="table" aria-label="Order Details">
                            ${detailRow('Customer', escHtml(customer))}
                            ${detailRow('Book Title', escHtml(title))}
                            ${detailRow('Pages', `${pages} pages`)}
                            ${detailRow('Quantity', `${qty} cop${qty === 1 ? 'y' : 'ies'}`)}
                            ${detailRow('Price per Copy', fmt(sellPrice))}
                            ${detailRow('Order Date', fmtDate(date))}
                            ${detailRow('Due Date',
                                `<span style="${dueStyle}">${fmtDate(dueDate)}${dueSuffix}</span>`,
                                isOverdue ? 'color:#DC2626;' : ''
                            )}
                        </div>

                        <!-- Payment Breakdown -->
                        <div class="section-label">Payment Breakdown</div>
                        <div class="breakdown-box">
                            <div class="breakdown-row">
                                <span class="breakdown-label">Total Amount Billed</span>
                                <span class="breakdown-value">${fmt(totalSell)}</span>
                            </div>
                            <div class="breakdown-row paid-credit">
                                <span class="breakdown-label">Amount Paid</span>
                                <span class="breakdown-value">− ${fmt(amtPaid)}</span>
                            </div>
                            <div class="breakdown-row total-row">
                                <span>${status === 'paid' ? '✅ Fully Settled' : 'Balance Remaining'}</span>
                                <span class="${SC.totalClass}">${fmt(displayAmount)}</span>
                            </div>
                        </div>

                        ${successHTML}

                    </div>

                    <!-- ── Footer ── -->
                    <div class="card-footer">
                        <p>
                            Questions about this invoice?<br>
                            Contact <strong>${escHtml(biz)}</strong> — <a href="mailto:${escHtml(contact)}">${escHtml(contact)}</a>
                        </p>
                    </div>

                </div>
            `;
        }

        function detailRow(label, value, labelStyle = '') {
            return `
                <div class="detail-row" role="row">
                    <span class="detail-label" style="${labelStyle}">${label}</span>
                    <span class="detail-value">${value}</span>
                </div>
            `;
        }

        function escHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // Re-render if hash changes (deep link navigation)
        window.addEventListener('hashchange', render);
        render();
    </script>

</body>
</html>
