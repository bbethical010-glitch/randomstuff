<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>BookPrint Pro — Account Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --navy: #0A192F;
            --navy-mid: #112240;
            --navy-light: #1E3A5F;
            --gold: #D4AF37;
            --gold-soft: rgba(212,175,55,0.15);
            --gold-glow: rgba(212,175,55,0.35);
            --success: #10B981;
            --success-bg: rgba(16,185,129,0.1);
            --warning: #F59E0B;
            --warning-bg: rgba(245,158,11,0.1);
            --danger: #EF4444;
            --danger-bg: rgba(239,68,68,0.1);
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
            --border: rgba(255,255,255,0.08);
            --card-bg: rgba(255,255,255,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-family: 'Inter', sans-serif; }
        body { background: var(--navy); color: var(--text-main); min-height: 100vh; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 10px; }

        /* ===================== LOADING ===================== */
        #loading-screen {
            position: fixed; inset: 0; background: var(--navy);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; gap: 20px;
        }
        .loading-logo { font-size: 36px; font-weight: 900; letter-spacing: -1px; color: var(--text-main); }
        .loading-logo span { color: var(--gold); }
        .loading-spinner {
            width: 40px; height: 40px; border: 3px solid rgba(212,175,55,0.2);
            border-top-color: var(--gold); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===================== ACCESS DENIED ===================== */
        .denied-page {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 40px 20px;
        }
        .denied-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px;
            padding: 60px 40px; max-width: 480px; width: 100%; text-align: center;
        }
        .denied-icon { font-size: 64px; margin-bottom: 24px; }
        .denied-card h2 { font-size: 26px; font-weight: 800; margin-bottom: 12px; color: var(--gold); }
        .denied-card p { color: var(--text-muted); line-height: 1.7; font-size: 15px; }

        /* ===================== BACKGROUND ORBS ===================== */
        .bg-orb {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(80px); opacity: 0.15;
        }
        .orb1 { width: 500px; height: 500px; background: var(--gold); top: -200px; right: -150px; }
        .orb2 { width: 400px; height: 400px; background: #3B82F6; bottom: -150px; left: -100px; }

        /* ===================== MAIN LAYOUT ===================== */
        .dashboard-wrap {
            position: relative; z-index: 1; max-width: 980px; margin: 0 auto;
            padding: 0 20px 80px;
        }

        /* ===================== HEADER ===================== */
        .db-header {
            padding: 32px 0 40px;
            display: flex; flex-direction: column; gap: 28px;
        }
        .db-brand {
            display: flex; align-items: center; gap: 12px;
        }
        .db-logo {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--gold), #B8860B);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 22px; color: var(--navy);
            box-shadow: 0 0 24px var(--gold-glow);
        }
        .db-brand-name { font-size: 18px; font-weight: 700; color: var(--text-main); }
        .db-brand-name span { color: var(--gold); }
        .db-brand-date { font-size: 13px; color: var(--text-muted); margin-top: 1px; }

        .db-greeting { }
        .db-greeting h1 {
            font-size: clamp(24px, 5vw, 34px); font-weight: 800; line-height: 1.2;
            background: linear-gradient(135deg, #FFFFFF, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .db-greeting p { color: var(--text-muted); margin-top: 8px; font-size: 15px; }

        /* ===================== BANNERS ===================== */
        .db-banner {
            border-radius: 14px; padding: 16px 20px;
            display: flex; align-items: center; gap: 14px;
            font-size: 14px; font-weight: 600; margin-bottom: 8px;
        }
        .db-banner-overdue {
            background: var(--danger-bg); border: 1px solid rgba(239,68,68,0.3); color: #FCA5A5;
        }
        .db-banner-success {
            background: var(--success-bg); border: 1px solid rgba(16,185,129,0.3); color: #6EE7B7;
        }
        .db-banner-icon { font-size: 20px; flex-shrink: 0; }
        .db-banner p { font-weight: 500; color: inherit; }

        /* ===================== SUMMARY CARDS ===================== */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px; margin-bottom: 32px;
        }
        .summary-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 18px; padding: 24px 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .summary-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.2); }
        .summary-card-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
        .summary-card-value { font-size: 26px; font-weight: 800; color: var(--text-main); }
        .summary-card-sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
        .card-billed .summary-card-value { color: var(--text-main); }
        .card-paid .summary-card-value { color: var(--success); }
        .card-outstanding .summary-card-value { color: var(--danger); }
        .card-outstanding { border-left: 3px solid var(--danger); }
        .card-paid { border-left: 3px solid var(--success); }
        .card-invoices { border-left: 3px solid var(--gold); }

        /* ===================== SECTION TITLE ===================== */
        .section-title {
            font-size: 18px; font-weight: 700; margin-bottom: 16px;
            color: var(--text-main); display: flex; align-items: center; gap: 10px;
        }
        .section-title::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        /* ===================== TRANSACTIONS TABLE ===================== */
        .transactions-table-wrap {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 18px; overflow: hidden;
        }
        .transactions-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .transactions-table thead {
            background: rgba(255,255,255,0.04);
        }
        .transactions-table th {
            padding: 14px 16px; text-align: left; font-size: 11px;
            font-weight: 700; color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 0.04em; border-bottom: 1px solid var(--border);
        }
        .transactions-table td {
            padding: 14px 16px; border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .transactions-table tbody tr:last-child td { border-bottom: none; }
        .transactions-table tr { transition: background 0.15s; }
        .transactions-table tbody tr:hover { background: rgba(255,255,255,0.03); }

        /* Row highlights */
        .row-paid { background: rgba(16,185,129,0.05); }
        .row-paid:hover { background: rgba(16,185,129,0.08) !important; }
        .row-overdue { background: rgba(239,68,68,0.06); }
        .row-overdue:hover { background: rgba(239,68,68,0.1) !important; }
        .row-partial { background: rgba(245,158,11,0.05); }
        .row-partial:hover { background: rgba(245,158,11,0.08) !important; }

        /* Status badges */
        .badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap;
        }
        .badge-paid { background: var(--success-bg); color: #10B981; border: 1px solid rgba(16,185,129,0.3); }
        .badge-partial { background: var(--warning-bg); color: #F59E0B; border: 1px solid rgba(245,158,11,0.3); }
        .badge-unpaid { background: rgba(239,68,68,0.12); color: #EF4444; border: 1px solid rgba(239,68,68,0.3); }
        .badge-overdue { background: rgba(239,68,68,0.18); color: #F87171; border: 1px solid rgba(239,68,68,0.5); animation: pulse-badge 2s infinite; }
        @keyframes pulse-badge { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* View Invoice button */
        .btn-view {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-muted); padding: 6px 12px; border-radius: 8px;
            font-size: 11px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        .btn-view:hover {
            border-color: var(--gold); color: var(--gold);
            background: var(--gold-soft);
        }

        /* ===================== INVOICE MODAL ===================== */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .inv-modal {
            background: var(--navy-mid); border: 1px solid var(--border);
            border-radius: 24px; width: 100%; max-width: 900px; max-height: 92vh;
            display: flex; flex-direction: column; overflow: hidden; animation: modalIn 0.25s ease-out;
        }
        @keyframes modalIn { from { opacity: 0; transform: translateY(20px) scale(0.96); } to { opacity: 1; transform: none; } }
        .inv-modal-header {
            padding: 24px 28px 20px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); position: sticky; top: 0;
            background: var(--navy-mid); z-index: 2;
        }
        .inv-modal-header h3 { font-size: 18px; font-weight: 700; }
        .inv-modal-close {
            width: 36px; height: 36px; border-radius: 10px;
            background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            color: var(--text-muted); font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .inv-modal-close:hover { background: rgba(239,68,68,0.15); color: var(--danger); }
        .inv-modal-body { padding: 28px; }

        .inv-row {
            display: flex; justify-content: space-between; align-items: baseline;
            padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .inv-row:last-child { border-bottom: none; }
        .inv-row-label { font-size: 13px; color: var(--text-muted); }
        .inv-row-val { font-size: 14px; font-weight: 600; color: var(--text-main); }

        .inv-totals {
            background: rgba(255,255,255,0.03); border-radius: 14px;
            padding: 16px; margin-top: 20px; border: 1px solid var(--border);
        }
        .inv-total-row {
            display: flex; justify-content: space-between;
            padding: 8px 0; font-size: 14px;
        }
        .inv-total-row.grand {
            border-top: 1px solid var(--border); margin-top: 8px; padding-top: 12px;
            font-size: 16px; font-weight: 800;
        }
        .inv-overdue-note {
            background: var(--danger-bg); border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px; padding: 12px 16px; margin-top: 16px;
            font-size: 13px; color: #FCA5A5; display: flex; gap: 10px; align-items: center;
        }

        /* ===================== FOOTER ===================== */
        .db-footer {
            text-align: center; margin-top: 60px; padding-top: 32px;
            border-top: 1px solid var(--border); color: var(--text-muted); font-size: 13px;
        }
        .db-footer strong { color: var(--gold); }
        .db-footer a { color: var(--text-muted); text-decoration: none; }
        .db-footer a:hover { color: var(--gold); }

        /* ===================== RESPONSIVE ===================== */
        @media (max-width: 640px) {
            .summary-grid { grid-template-columns: 1fr 1fr; }
            .transactions-table th:nth-child(3),
            .transactions-table td:nth-child(3),
            .transactions-table th:nth-child(4),
            .transactions-table td:nth-child(4) { display: none; }
            .inv-modal-body { padding: 20px; }
        }
        @media (max-width: 400px) {
            .summary-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
    <div class="loading-logo">Book<span>Print</span> Pro</div>
    <div class="loading-spinner"></div>
</div>

<!-- Orbs -->
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<!-- Content Mount -->
<div id="app"></div>

<!-- Invoice Detail Modal -->
<div class="modal-overlay" id="inv-modal-overlay" onclick="closeInvModal(event)">
    <div class="inv-modal" id="inv-modal-content"></div>
</div>

<script>
    let liveSyncData = null; // Stores data from db_export.json if available

    // ====================================================
    // DEFAULT BIN ID — SET THIS ONCE TO ENABLE LIVE SYNC
    // Paste your JSONBin.io Bin ID here.
    // This makes ALL existing links live, not just new ones.
    // ====================================================
    const DEFAULT_BIN_ID = ''; // e.g. '67f3a8c2abc123456789'

    // =============================================
    // HELPERS
    // =============================================
    function fmt(v) {
        return new Intl.NumberFormat('en-IN', {
            style: 'currency', currency: 'INR', minimumFractionDigits: 2
        }).format(v || 0);
    }

    function fmtDate(d, opts) {
        if (!d) return 'N/A';
        return new Date(d + 'T00:00:00').toLocaleDateString('en-IN',
            opts || { year: 'numeric', month: 'short', day: 'numeric' }
        );
    }

    function today() { return new Date().toISOString().split('T')[0]; }

    async function fetchLiveSyncData() {
        // Priority: URL ?bin= param → hardcoded DEFAULT_BIN_ID → fallback db_export.json
        const searchParams = new URLSearchParams(window.location.search);
        const binId = searchParams.get('bin') || DEFAULT_BIN_ID;

        if (binId) {
            // JSONBin.io approach — fully automated, instant live updates
            try {
                const resp = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
                    headers: { 'X-Access-Key': '' } // public bin — no key needed for reads
                });
                if (resp.ok) {
                    const json = await resp.json();
                    liveSyncData = json.record; // JSONBin wraps the data in .record
                    console.log('JSONBin Live Sync Loaded:', liveSyncData);
                    return;
                } else {
                    console.warn('JSONBin returned', resp.status, '— check Bin is set to Public.');
                }
            } catch (e) {
                console.warn('JSONBin fetch failed, falling back to URL payload.', e);
            }
        }

        // Last resort: try fetching db_export.json from the same server (GitHub Pages)
        try {
            const resp = await fetch('db_export.json?v=' + Date.now());
            if (resp.ok) {
                liveSyncData = await resp.json();
                console.log('Local db_export.json Loaded:', liveSyncData);
            }
        } catch (e) {
            console.warn('No live data available, showing URL snapshot.');
        }
    }


    function closeInvModal(e) {
        if (e.target === document.getElementById('inv-modal-overlay')) {
            document.getElementById('inv-modal-overlay').classList.remove('open');
        }
    }

    function openInvModal() {
        document.getElementById('inv-modal-overlay').classList.add('open');
    }

    // =============================================
    // URL PARSING
    // =============================================
    function parseUrl() {
        const hash = window.location.hash.slice(1); // remove '#'
        if (!hash) return null;

        // If we have live data, try to match by token first
        const searchParams = new URLSearchParams(window.location.search);
        const token = searchParams.get('token');

        if (token && liveSyncData && liveSyncData.customers && liveSyncData.customers[token]) {
            return { 
                mode: 'dashboard', 
                data: liveSyncData.customers[token],
                isLive: true,
                lastUpdated: liveSyncData.exportedAt 
            };
        }

        // FALLBACK: Parse from URL hash payload
        // NEW FORMAT: #dashboard?data=BASE64 — full customer dashboard
        if (hash.startsWith('dashboard?')) {
            const params = new URLSearchParams(hash.slice('dashboard?'.length));
            const raw = params.get('data');
            if (!raw) return null;
            try {
                const json = JSON.parse(decodeURIComponent(escape(atob(raw))));
                return { mode: 'dashboard', data: json, isLive: false };
            } catch(e) { return null; }
        }

        // LEGACY FORMAT: #data=BASE64 — single invoice view
        if (hash.startsWith('data=')) {
            const raw = hash.slice(5);
            try {
                const json = JSON.parse(decodeURIComponent(escape(atob(raw))));
                return { mode: 'single', data: json, isLive: false };
            } catch(e) { return null; }
        }

        return null;
    }

    // =============================================
    // RENDER: ACCESS DENIED
    // =============================================
    function renderAccessDenied() {
        return `
        <div class="denied-page">
            <div class="denied-card">
                <div class="denied-icon">🔒</div>
                <h2>Invalid Link</h2>
                <p>This payment link is invalid, expired, or has been revoked. Please contact your service provider and ask them to share a fresh payment link with you.</p>
            </div>
        </div>`;
    }

    // =============================================
    // RENDER: FULL CUSTOMER DASHBOARD
    // =============================================
    function renderDashboard(d, isLive = false, updatedTime = null) {
        const customer = d.customer || 'Valued Customer';
        const invoices = d.invoices || [];
        const bizName = d.businessName || 'BookPrint Pro Services';
        const bizContact = d.businessContact || 'contact@bookprintpro.com';
        const todayStr = today();

        const todayFmt = new Date().toLocaleDateString('en-IN', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        // Sync Pill
        const syncLabel = isLive ? 'LIVE' : 'SNAPSHOT';
        const syncColor = isLive ? 'var(--success)' : 'var(--warning)';
        const syncIcon = isLive ? '●' : '📸';
        const syncPill = `
            <div style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:6px; background:rgba(255,255,255,0.05); border:1px solid ${syncColor}44; font-size:10px; font-weight:800; color:${syncColor}; letter-spacing:0.05em;">
                <span style="font-size:8px;">${syncIcon}</span> ${syncLabel}
            </div>
        `;

        // Aggregate stats
        const totalBilled = invoices.reduce((s, i) => s + (i.totalSell || 0), 0);
        const totalPaid = invoices.reduce((s, i) => s + (i.amtPaid || 0), 0);
        const totalOutstanding = totalBilled - totalPaid;
        const totalInvoices = invoices.length;
        const unpaidCount = invoices.filter(i => (i.totalSell - i.amtPaid) > 0.01).length;

        const hasOverdue = invoices.some(i =>
            i.dueDate && i.dueDate < todayStr && (i.totalSell - i.amtPaid) > 0.01
        );
        const allPaid = totalOutstanding <= 0.01 && totalInvoices > 0;

        // Banners
        const bannerHTML = allPaid
            ? `<div class="db-banner db-banner-success">
                   <span class="db-banner-icon">🎉</span>
                   <p>You have no outstanding dues. Thank you for your payments — we appreciate your trust!</p>
               </div>`
            : (hasOverdue
                ? `<div class="db-banner db-banner-overdue">
                       <span class="db-banner-icon">⚠️</span>
                       <p>You have overdue payments. Please clear them at your earliest convenience to avoid any service disruption.</p>
                   </div>`
                : '');


        // Summary cards
        const summaryHTML = `
        <div class="summary-grid">
            <div class="summary-card card-billed">
                <div class="summary-card-label">Total Billed</div>
                <div class="summary-card-value">${fmt(totalBilled)}</div>
                <div class="summary-card-sub">Across ${totalInvoices} invoice${totalInvoices !== 1 ? 's' : ''}</div>
            </div>
            <div class="summary-card card-paid">
                <div class="summary-card-label">Total Paid</div>
                <div class="summary-card-value">${fmt(totalPaid)}</div>
                <div class="summary-card-sub">Payments received</div>
            </div>
            <div class="summary-card card-outstanding">
                <div class="summary-card-label">Outstanding</div>
                <div class="summary-card-value">${fmt(Math.max(totalOutstanding, 0))}</div>
                <div class="summary-card-sub">Balance due</div>
            </div>
            <div class="summary-card card-invoices">
                <div class="summary-card-label">Invoices</div>
                <div class="summary-card-value">${totalInvoices}</div>
                <div class="summary-card-sub">${unpaidCount} pending payment</div>
            </div>
        </div>`;

        // Transactions table
        const tableRows = invoices.map((inv, idx) => {
            const bal = inv.totalSell - inv.amtPaid;
            const isPaid = bal <= 0.01;
            const isOverdue = !isPaid && inv.dueDate && inv.dueDate < todayStr;
            const isPartial = !isPaid && (inv.amtPaid || 0) > 0;

            let rowClass = '';
            let badge = '';
            if      (isPaid)    { rowClass = 'row-paid';    badge = '<span class="badge badge-paid">✓ Paid</span>'; }
            else if (isOverdue) { rowClass = 'row-overdue'; badge = '<span class="badge badge-overdue">⚠ Overdue</span>'; }
            else if (isPartial) { rowClass = 'row-partial'; badge = '<span class="badge badge-partial">⏳ Partial</span>'; }
            else                { rowClass = '';              badge = '<span class="badge badge-unpaid">• Unpaid</span>'; }

            return `
            <tr class="${rowClass}">
                <td>
                    <div style="font-weight:700; font-size:12px; color: var(--gold);">${inv.invoiceNum || `#INV-${(inv.id||idx).toString().slice(-8).toUpperCase()}`}</div>
                    <div style="font-size:11px; color:var(--text-muted);">${fmtDate(inv.date)}</div>
                </td>
                <td>
                    <div style="font-weight:600;">${inv.title || '—'}</div>
                    <div style="font-size:11px; color:var(--text-muted);">${inv.pages || '?'} pages × ${inv.qty || '?'} copies</div>
                </td>
                <td style="white-space:nowrap;">
                    <div style="font-size:11px; color:var(--text-muted);">Due</div>
                    <div style="font-weight:600; color:${isOverdue ? 'var(--danger)' : 'var(--text-main)'}; font-size:12px;">
                        ${inv.dueDate ? fmtDate(inv.dueDate) : 'Upon Receipt'}
                    </div>
                </td>
                <td style="font-weight:700;">${fmt(inv.totalSell)}</td>
                <td style="color:var(--success); font-weight:600;">${fmt(inv.amtPaid)}</td>
                <td style="color:${isPaid ? 'var(--success)' : 'var(--danger)'}; font-weight:800;">${fmt(Math.max(bal, 0))}</td>
                <td>${badge}</td>
                <td>
                    <button class="btn-view" onclick='viewInvoice(${JSON.stringify(inv).replace(/'/g, "\\'")},"${isOverdue ? '1' : '0'}","${isPaid ? '1' : '0'}","${isPartial ? '1' : '0'}")'>
                        View
                    </button>
                </td>
            </tr>`;
        }).join('');

        return `
        <div class="dashboard-wrap">
            <div class="db-header">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div class="db-brand">
                        <div class="db-logo">B</div>
                        <div>
                            <div class="db-brand-name">${bizName.split(' ').slice(0,2).join(' ')} <span>${bizName.split(' ').slice(2).join(' ')}</span></div>
                            <div class="db-brand-date">${todayFmt}</div>
                        </div>
                    </div>
                    <div>${syncPill}</div>
                </div>
                <div class="db-greeting">
                    <h1>Hello, ${customer} 👋</h1>
                    <p>Here is your ${isLive ? 'real-time' : 'shared'} account summary with all your print orders and payment history.</p>
                    ${updatedTime ? `<div style="font-size:10px; color:var(--text-muted); margin-top:8px; display:flex; align-items:center; gap:4px;">⏱️ Last updated: ${new Date(updatedTime).toLocaleString('en-IN')}</div>` : ''}
                </div>
                ${bannerHTML}
            </div>


            ${summaryHTML}

            <div class="section-title">Transaction History</div>

            <div class="transactions-table-wrap">
                ${invoices.length === 0
                    ? '<div style="text-align:center; padding:48px; color:var(--text-muted);">No invoices found for your account.</div>'
                    : `<div style="overflow-x:auto;"><table class="transactions-table">
                        <thead>
                            <tr>
                                <th>Invoice</th>
                                <th>Book / Job</th>
                                <th>Due Date</th>
                                <th>Total</th>
                                <th>Paid</th>
                                <th>Balance</th>
                                <th>Status</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>${tableRows}</tbody>
                    </table></div>`
                }
            </div>

            <div class="db-footer">
                <p>
                    <strong>${bizName}</strong><br>
                    For payment queries, contact us at <a href="mailto:${bizContact}">${bizContact}</a>
                </p>
                <p style="margin-top:12px; font-size:11px; opacity:0.5;">
                    This is a secure, read-only account view. Your financial data is private.
                </p>
            </div>
        </div>`;
    }

    // =============================================
    // RENDER: SINGLE INVOICE (LEGACY)
    // =============================================
    function renderSingleInvoice(o) {
        const balance = (o.totalSell || 0) - (o.amtPaid || 0);
        const todayStr = today();
        const isOverdue = o.dueDate && o.dueDate < todayStr && balance > 0.01;
        const isPaid = balance <= 0.01;
        const isPartial = !isPaid && (o.amtPaid || 0) > 0;

        const statusLabel = isPaid ? 'Payment Complete' : isPartial ? 'Partially Paid' : 'Payment Due';
        const statusColor = isPaid ? 'var(--success)' : isPartial ? 'var(--warning)' : 'var(--danger)';

        const invoices = [{
            invoiceNum: o.invoiceNum || `#INV-${Date.now().toString().slice(-8).toUpperCase()}`,
            title: o.title, pages: o.pages, qty: o.qty,
            sellPrice: o.sellPrice, totalSell: o.totalSell, amtPaid: o.amtPaid,
            date: o.date, dueDate: o.dueDate
        }];

        const dashData = {
            customer: o.customer || 'Customer',
            invoices,
            businessName: o.businessName || 'BookPrint Pro Services',
            businessContact: o.businessContact || 'contact@bookprintpro.com'
        };
        return renderDashboard(dashData);
    }

    // =============================================
    // PROFESSIONAL INVOICE PDF/PRINT
    // =============================================
    let _currentInvoice = null;
    let _currentBizName = 'BookPrint Pro Services';
    let _currentBizContact = 'contact@bookprintpro.com';
    let _currentCustomer = '';

    function viewInvoice(inv, isOverdueStr, isPaidStr, isPartialStr) {
        const isOverdue = isOverdueStr === '1';
        const isPaid = isPaidStr === '1';
        const isPartial = isPartialStr === '1';
        const bal = Math.max((inv.totalSell || 0) - (inv.amtPaid || 0), 0);

        _currentInvoice = { inv, isOverdue, isPaid, isPartial, bal };

        const statusBadge = isPaid
            ? `<div style="display:inline-block; padding:6px 16px; background:#D1FAE5; color:#065F46; font-weight:800; font-size:12px; border-radius:4px; letter-spacing:0.05em; border:2px solid #065F46;">PAID IN FULL</div>`
            : isOverdue
            ? `<div style="display:inline-block; padding:6px 16px; background:#FEE2E2; color:#991B1B; font-weight:800; font-size:12px; border-radius:4px; letter-spacing:0.05em; border:2px solid #991B1B;">OVERDUE</div>`
            : isPartial
            ? `<div style="display:inline-block; padding:6px 16px; background:#FEF3C7; color:#92400E; font-weight:800; font-size:12px; border-radius:4px; letter-spacing:0.05em; border:2px solid #92400E;">PARTIAL PAYMENT</div>`
            : `<div style="display:inline-block; padding:6px 16px; background:#FEE2E2; color:#991B1B; font-weight:800; font-size:12px; border-radius:4px; letter-spacing:0.05em; border:2px solid #991B1B;">PAYMENT PENDING</div>`;

        const invoiceHTML = `
        <div id="professional-invoice" style="font-family:'Inter',sans-serif; background:#fff; color:#111; padding:48px; max-width:720px; margin:0 auto; box-sizing:border-box;">

            <!-- HEADER -->
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:40px; padding-bottom:32px; border-bottom:3px solid #0A192F;">
                <div>
                    <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
                        <div style="width:48px; height:48px; background:linear-gradient(135deg,#D4AF37,#B8860B); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:900; color:#0A192F;">B</div>
                        <div>
                            <div style="font-size:22px; font-weight:900; color:#0A192F; letter-spacing:-0.5px;">${_currentBizName}</div>
                            <div style="font-size:12px; color:#64748B;">Professional Book Printing Services</div>
                        </div>
                    </div>
                    <div style="font-size:12px; color:#64748B; line-height:1.8; margin-top:8px;">
                        📧 ${_currentBizContact}
                    </div>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:36px; font-weight:900; color:#0A192F; letter-spacing:-1px; line-height:1;">INVOICE</div>
                    <div style="font-size:15px; font-weight:700; color:#D4AF37; margin:4px 0;">${inv.invoiceNum || '#INV-XXXXXXXX'}</div>
                    <div style="margin-top:12px;">${statusBadge}</div>
                </div>
            </div>

            <!-- BILL TO / INVOICE INFO -->
            <div style="display:flex; justify-content:space-between; margin-bottom:40px;">
                <div>
                    <div style="font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:#94A3B8; margin-bottom:8px;">Bill To</div>
                    <div style="font-size:18px; font-weight:800; color:#0A192F;">${_currentCustomer || inv.customer || 'Valued Customer'}</div>
                    <div style="font-size:12px; color:#64748B; margin-top:4px;">Customer Account</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:#94A3B8; margin-bottom:6px;">Invoice Details</div>
                    <table style="font-size:13px; color:#374151; border-collapse:collapse;">
                        <tr>
                            <td style="padding:3px 16px 3px 0; color:#94A3B8; font-weight:600;">Issue Date</td>
                            <td style="text-align:right; font-weight:600;">${fmtDate(inv.date, {year:'numeric', month:'long', day:'numeric'})}</td>
                        </tr>
                        <tr>
                            <td style="padding:3px 16px 3px 0; color:${isOverdue ? '#DC2626':'#94A3B8'}; font-weight:600;">Due Date</td>
                            <td style="text-align:right; font-weight:700; color:${isOverdue ? '#DC2626':'#111'};">${inv.dueDate ? fmtDate(inv.dueDate, {year:'numeric', month:'long', day:'numeric'}) : 'Upon Receipt'}${isOverdue ? ' ⚠️' : ''}</td>
                        </tr>
                    </table>
                </div>
            </div>

            <!-- LINE ITEMS TABLE -->
            <table style="width:100%; border-collapse:collapse; margin-bottom:0;">
                <thead>
                    <tr style="background:#0A192F; color:#D4AF37;">
                        <th style="padding:14px 16px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em;">Description</th>
                        <th style="padding:14px 16px; text-align:right; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em;">Pages</th>
                        <th style="padding:14px 16px; text-align:right; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em;">Qty</th>
                        <th style="padding:14px 16px; text-align:right; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em;">Unit Price</th>
                        <th style="padding:14px 16px; text-align:right; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em;">Total</th>
                    </tr>
                </thead>
                <tbody>
                    <tr style="border-bottom:1px solid #E2E8F0; background:#FAFAFA;">
                        <td style="padding:16px; font-size:14px;">
                            <div style="font-weight:700; color:#0A192F;">${inv.title || 'Book Printing Service'}</div>
                            <div style="font-size:12px; color:#64748B; margin-top:2px;">Custom book printing – ${inv.pages || '?'} pages per copy</div>
                        </td>
                        <td style="padding:16px; text-align:right; font-size:14px; color:#374151; font-weight:500;">${inv.pages || '—'}</td>
                        <td style="padding:16px; text-align:right; font-size:14px; color:#374151; font-weight:500;">${inv.qty || '—'} ${(inv.qty || 1) === 1 ? 'copy' : 'copies'}</td>
                        <td style="padding:16px; text-align:right; font-size:14px; color:#374151; font-weight:500;">${fmt(inv.sellPrice)}</td>
                        <td style="padding:16px; text-align:right; font-size:14px; color:#0A192F; font-weight:700;">${fmt(inv.totalSell)}</td>
                    </tr>
                </tbody>
            </table>

            <!-- TOTALS -->
            <div style="display:flex; justify-content:flex-end; margin-bottom:40px;">
                <div style="min-width:320px;">
                    <div style="display:flex; justify-content:space-between; padding:10px 16px; font-size:13px; color:#64748B; border-bottom:1px solid #E2E8F0;">
                        <span>Subtotal</span><span style="font-weight:600; color:#374151;">${fmt(inv.totalSell)}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; padding:10px 16px; font-size:13px; color:#059669; border-bottom:1px solid #E2E8F0;">
                        <span>Amount Paid</span><span style="font-weight:600;">− ${fmt(inv.amtPaid)}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; padding:14px 16px; font-size:15px; font-weight:800; background:#0A192F; color:${isPaid ? '#10B981' : '#EF4444'};">
                        <span style="color:#D4AF37;">${isPaid ? '✓ Fully Settled' : 'Balance Due'}</span>
                        <span>${fmt(bal)}</span>
                    </div>
                </div>
            </div>

            <!-- PAYMENT NOTE -->
            <div style="background:#F8FAFC; border:1px solid #E2E8F0; border-left:4px solid #D4AF37; padding:20px; border-radius:4px; margin-bottom:32px;">
                <div style="font-size:12px; font-weight:700; color:#0A192F; margin-bottom:6px;">PAYMENT INSTRUCTIONS</div>
                <p style="font-size:13px; color:#64748B; line-height:1.6; margin:0;">
                    Please include your invoice number <strong style="color:#0A192F;">${inv.invoiceNum || '#INV-XXXXXXXX'}</strong> when making payment.
                    For queries, contact us at <strong style="color:#D4AF37;">${_currentBizContact}</strong>.
                </p>
            </div>

            <!-- FOOTER -->
            <div style="display:flex; justify-content:space-between; align-items:flex-end; border-top:2px solid #0A192F; padding-top:20px;">
                <div style="font-size:11px; color:#94A3B8;">
                    ${_currentBizName} &nbsp;·&nbsp; Professional Book Printing
                </div>
                <div style="text-align:center;">
                    <div style="font-size:10px; color:#CBD5E1; margin-bottom:4px;">Authorized Signature</div>
                    <div style="width:120px; border-top:1px solid #CBD5E1; padding-top:4px; font-size:10px; color:#94A3B8;">For ${_currentBizName}</div>
                </div>
            </div>
        </div>`;

        const modal = document.getElementById('inv-modal-content');
        modal.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid rgba(255,255,255,0.08); flex-shrink:0;">
            <span style="font-weight:700; font-size:14px;">${inv.invoiceNum || 'Invoice'}</span>
            <div style="display:flex; gap:8px; align-items:center;">
                <button onclick="printInvoiceDoc()" style="padding:7px 14px; border-radius:8px; border:1px solid rgba(255,255,255,0.15); background:transparent; color:#94A3B8; cursor:pointer; font-size:12px; font-weight:600;">🖨 Print</button>
                <button onclick="downloadInvoicePDF()" style="padding:7px 14px; border-radius:8px; border:none; background:var(--gold); color:var(--navy); cursor:pointer; font-size:12px; font-weight:700;">⬇ Download PDF</button>
                <button onclick="document.getElementById('inv-modal-overlay').classList.remove('open')" style="background:none; border:none; color:#94A3B8; font-size:22px; cursor:pointer; line-height:1; padding:2px 4px;">&times;</button>
            </div>
        </div>
        <div id="invoice-print-area" style="overflow-y:auto; flex:1; padding:0; background:#F0F2F5;">
            ${invoiceHTML}
        </div>`;

        openInvModal();
    }

    function downloadInvoicePDF() {
        const element = document.getElementById('professional-invoice');
        if (!element || !_currentInvoice) return;
        const { inv } = _currentInvoice;
        const opt = {
            margin: 0,
            filename: `Invoice_${(inv.invoiceNum || 'INV').replace('#','').replace(/\s/g,'_')}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
            jsPDF: { unit: 'px', format: [760, 1000], orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    function printInvoiceDoc() {
        const element = document.getElementById('professional-invoice');
        if (!element) return;
        const printWin = window.open('', '_blank');
        printWin.document.write(`<!DOCTYPE html><html><head><title>Invoice</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><style>body{margin:0;padding:0;font-family:Inter,sans-serif;}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style></head><body>`);
        printWin.document.write(element.outerHTML);
        printWin.document.write('</body></html>');
        printWin.document.close();
        printWin.focus();
        setTimeout(() => { printWin.print(); printWin.close(); }, 500);
    }

    // =============================================
    // INIT
    // =============================================
    window.addEventListener('DOMContentLoaded', async () => {
        // First try to fetch live data
        await fetchLiveSyncData();

        setTimeout(() => {
            const parsed = parseUrl();
            const app = document.getElementById('app');
            const loader = document.getElementById('loading-screen');

            if (!parsed) {
                app.innerHTML = renderAccessDenied();
            } else if (parsed.mode === 'dashboard') {
                // Store biz info for invoice use
                if (parsed.data) {
                    _currentBizName = parsed.data.businessName || _currentBizName;
                    _currentBizContact = parsed.data.businessContact || _currentBizContact;
                    _currentCustomer = parsed.data.customer || '';
                }
                app.innerHTML = renderDashboard(parsed.data, parsed.isLive, parsed.lastUpdated);
            } else if (parsed.mode === 'single') {
                app.innerHTML = renderSingleInvoice(parsed.data);
            } else {
                app.innerHTML = renderAccessDenied();
            }

            loader.style.transition = 'opacity 0.4s';
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 400);
        }, 500);
    });
</script>
</body>
</html>
